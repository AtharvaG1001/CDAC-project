<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopWave Admin — Dashboard</title>
  <meta name="description" content="ShopWave Admin Dashboard — manage orders, products, and view analytics powered by GCP Cloud Functions and Azure Logic Apps." />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>" />
  <style>
    body { overflow: hidden; }
    .admin-main { overflow-y: auto; height: 100vh; }
    #admin-content-area { animation: fadeInUp 0.3s ease; }
  </style>
</head>
<body>

<div class="admin-layout">

  <!-- ══════════════════════════════════════
       SIDEBAR
  ══════════════════════════════════════ -->
  <aside class="admin-sidebar" aria-label="Admin Navigation">
    <div class="admin-sidebar-header">
      <div class="admin-sidebar-logo">🛍️ ShopWave</div>
      <div style="font-size:12px;color:var(--text-muted);margin-top:4px;">Admin Console</div>
    </div>

    <nav aria-label="Admin sections">
      <div class="admin-nav-item active" data-section="dashboard" role="button" tabindex="0">
        <span>📊</span> Dashboard
      </div>
      <div class="admin-nav-item" data-section="orders" role="button" tabindex="0">
        <span>📦</span> Orders
      </div>
      <div class="admin-nav-item" data-section="products" role="button" tabindex="0">
        <span>🛍️</span> Products
      </div>
      <div class="admin-nav-item" data-section="analytics" role="button" tabindex="0">
        <span>📈</span> Analytics
      </div>
    </nav>

    <div style="margin-top:auto;padding:20px 20px 24px;">
      <a href="index.html" class="btn btn-outline btn-sm" style="width:100%;text-align:center;display:block;">
        ← Back to Store
      </a>
      <div style="margin-top:16px;padding:14px;background:var(--bg-glass);border:1px solid var(--border);border-radius:var(--radius-md);">
        <div style="font-size:11px;color:var(--text-muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px;">Cloud Services</div>
        <div style="display:flex;flex-direction:column;gap:6px;">
          <div style="font-size:12px;color:var(--emerald);display:flex;align-items:center;gap:6px;">
            <span style="width:6px;height:6px;border-radius:50%;background:var(--emerald);display:inline-block;"></span>
            GCP Cloud Functions
          </div>
          <div style="font-size:12px;color:var(--emerald);display:flex;align-items:center;gap:6px;">
            <span style="width:6px;height:6px;border-radius:50%;background:var(--emerald);display:inline-block;"></span>
            Azure Logic Apps
          </div>
          <div style="font-size:12px;color:var(--emerald);display:flex;align-items:center;gap:6px;">
            <span style="width:6px;height:6px;border-radius:50%;background:var(--emerald);display:inline-block;"></span>
            Blob Storage (JSON)
          </div>
        </div>
      </div>
    </div>
  </aside>

  <!-- ══════════════════════════════════════
       MAIN CONTENT
  ══════════════════════════════════════ -->
  <main class="admin-content admin-main" id="admin-main" aria-label="Admin Content">

    <!-- Top Bar -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;padding-bottom:20px;border-bottom:1px solid var(--border);">
      <div>
        <div style="font-size:13px;color:var(--text-muted);">
          ShopWave Admin Console · GCP/Azure E-Commerce
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:10px;">
        <div style="width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--pink));display:flex;align-items:center;justify-content:center;font-size:15px;">A</div>
        <div>
          <div style="font-size:14px;font-weight:600;">Admin</div>
          <div style="font-size:12px;color:var(--text-muted);">admin@shopwave.in</div>
        </div>
      </div>
    </div>

    <!-- Dynamic Content Area — rendered by Admin.showSection() -->
    <div id="admin-content-area">
      <div style="display:flex;flex-direction:column;align-items:center;gap:16px;padding:60px;color:var(--text-secondary);">
        <div class="spinner"></div>
        <p>Loading admin data from Cloud Storage…</p>
      </div>
    </div>

  </main>
</div>

<!-- Toast -->
<div id="toast-container" aria-live="polite"></div>

<!-- Scripts -->
<script src="js/functions.js"></script>
<script src="js/cart.js"></script>
<script>
  // Toast needed by admin.js
  const Toast = (() => {
    function show(msg, type = 'info', duration = 3200) {
      const container = document.getElementById('toast-container');
      if (!container) return;
      const icons = { success: '✅', error: '❌', info: 'ℹ️' };
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.innerHTML = `<span class="toast-icon">${icons[type]||'ℹ️'}</span><span class="toast-msg">${msg}</span>`;
      container.appendChild(toast);
      setTimeout(() => {
        toast.classList.add('fade-out');
        setTimeout(() => toast.remove(), 300);
      }, duration);
    }
    return { show };
  })();
</script>
<script src="js/admin.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => Admin.init());
</script>

</body>
</html>
